<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Trading Bot Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .section {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .section h2 {
      margin-bottom: 15px;
      font-size: 1.5rem;
      color: #fff;
    }
    
    .data-block {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
    }
    
    .label {
      color: #00d4ff;
      font-weight: bold;
    }
    
    .chat-section {
      grid-column: 1 / -1;
      height: 400px;
      display: flex;
      flex-direction: column;
    }
    
    .chat-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 15px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    
    .msg {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 80%;
    }
    
    .msg.me {
      background: #007acc;
      margin-left: auto;
      text-align: right;
    }
    
    .msg.trader {
      background: #333;
      margin-right: auto;
    }
    
    .chat-input-area {
      display: flex;
      gap: 10px;
    }
    
    .chat-input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 14px;
    }
    
    .send-btn {
      padding: 12px 20px;
      background: #00d4ff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    
    .send-btn:hover {
      background: #00b8e6;
    }
    
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Crypto Trading Bot Dashboard</h1>
      <p>Real-time gas prices, DEX analytics, and trader chat</p>
    </div>

    <div class="grid">
      <div class="section">
        <h2>⛽ Gas Prices</h2>
        <div id="gas-prices" class="data-block">Loading...</div>
      </div>

      <div class="section">
        <h2>📊 DEX Analytics</h2>
        <div id="dex-analytics" class="data-block">Loading...</div>
      </div>

      <div class="section chat-section">
        <h2>💬 Chat with Trader</h2>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" class="chat-input" placeholder="Type your message to the trader...">
          <button id="send-btn" class="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Chat WebSocket ---
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    let ws;

    function appendMsg(sender, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      div.textContent = sender === 'me' ? 'You: ' + text : 'Trader: ' + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function connectChat() {
      ws = new WebSocket(`ws://${window.location.hostname}:8001/ws/chat`);
      ws.onopen = () => appendMsg('trader', 'Connected to trader chat.');
      ws.onmessage = (event) => {
        appendMsg('trader', event.data);
      };
      ws.onclose = () => appendMsg('trader', 'Chat disconnected.');
    }

    sendBtn.onclick = () => {
      const msg = chatInput.value.trim();
      if (msg && ws && ws.readyState === 1) {
        ws.send(msg);
        appendMsg('me', msg);
        chatInput.value = '';
      }
    };

    chatInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    connectChat();

    // --- Gas Prices ---
    async function fetchGas() {
      try {
        const res = await fetch('/api/gas');
        const data = await res.json();
        document.getElementById('gas-prices').innerHTML = `
          <span class="label">Safe:</span> ${data.safe_gas_price} Gwei<br>
          <span class="label">Standard:</span> ${data.standard_gas_price} Gwei<br>
          <span class="label">Fast:</span> ${data.fast_gas_price} Gwei<br>
          <span class="label">Base Fee:</span> ${data.base_fee} Gwei
        `;
      } catch {
        document.getElementById('gas-prices').textContent = 'Failed to load gas prices.';
      }
    }
    fetchGas();
    setInterval(fetchGas, 15000);

    // --- DEX Analytics Demo ---
    async function fetchDex() {
      try {
        const res = await fetch('/api/dex/analytics?pair_id=ETH-USDT');
        const data = await res.json();
        document.getElementById('dex-analytics').innerHTML = `
          <span class="label">Pair:</span> ${data.pairInfo?.baseToken || 'ETH'}/${data.pairInfo?.quoteToken || 'USDT'}<br>
          <span class="label">Price:</span> $${data.priceData?.current || '0.00'}<br>
          <span class="label">RSI:</span> ${data.indicators?.rsi?.current || 'N/A'}<br>
          <span class="label">Signal:</span> ${data.signals?.overallSignal || 'HOLD'}
        `;
      } catch {
        document.getElementById('dex-analytics').textContent = 'Failed to load analytics.';
      }
    }
    fetchDex();
    setInterval(fetchDex, 20000);
  </script>
</body>
</html>
